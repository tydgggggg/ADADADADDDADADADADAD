        package com.fpsboost.ui;

        import net.minecraft.client.gui.screen.Screen;
        import net.minecraft.client.gui.widget.ButtonWidget;
        import net.minecraft.text.Text;
        import com.fpsboost.config.ModConfig;

        public class FPSBoostMenuScreen extends Screen {
            private final Screen parent;

            public FPSBoostMenuScreen(Screen parent) {
                super(Text.literal("FPS Boost Pro Main Dashboard"));
                this.parent = parent;
            }

            @Override
            protected void init() {
                int startY = this.height / 2 - 45;

                this.addDrawableChild(ButtonWidget.builder(Text.literal("§e⚡ ONE CLICK INSTANT OPTIMIZE"), button -> {
                    FastOptimizeEngine.executeOneClickOptimize();
                    this.client.setScreen(this.parent);
                }).dimensions(this.width / 2 - 110, startY, 220, 20).build());

                this.addDrawableChild(ButtonWidget.builder(Text.literal("§b⚙ Core Tweaks Optimization"), button -> {
                    this.client.setScreen(new AddonSettingsScreen(this));
                }).dimensions(this.width / 2 - 110, startY + 24, 220, 20).build());

                this.addDrawableChild(ButtonWidget.builder(Text.literal("§a📊 Hardware Device Profiles"), button -> {
                    this.client.setScreen(new ProfileScreen(this));
                }).dimensions(this.width / 2 - 110, startY + 48, 220, 20).build());

                this.addDrawableChild(ButtonWidget.builder(Text.literal("Save & Exit"), button -> {
                    ModConfig.save();
                    this.client.setScreen(this.parent);
                }).dimensions(this.width / 2 - 60, startY + 78, 120, 20).build());
            }

            @Override
            public void render(net.minecraft.client.gui.DrawContext context, int mouseX, int mouseY, float delta) {
                this.renderBackground(context, mouseX, mouseY, delta);
                context.drawCenteredTextWithShadow(this.textRenderer, "§dFPS Boost Pro Engine v3.0 (Independent)", this.width / 2, 15, 0xFFFFFF);
                context.drawCenteredTextWithShadow(this.textRenderer, "§7Designed for Performance Optimization on PojavLauncher", this.width / 2, 28, 0xAAAAAA);
                
                String sodiumStatus = ModConfig.isSodiumLoaded ? "§aSodium Checked" : "§eSodium Not Loaded";
                String entityCullingStatus = ModConfig.isEntityCullingLoaded ? "§aEntityCulling Active" : "§7EntityCulling Inactive";
                context.drawCenteredTextWithShadow(this.textRenderer, sodiumStatus + " §7| " + entityCullingStatus, this.width / 2, this.height - 22, 0xAAAAAA);
                super.render(context, mouseX, mouseY, delta);
            }
        }
        EOF


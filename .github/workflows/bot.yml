name: Run 6b6t Anarchy Bot 24/7

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Desktop Environment & Cloudflared
      run: |
        echo "⏳ در حال نصب ابزارهای محیط گرافیکی و مرورگر..."
        sudo apt-get update
        sudo apt-get install -y xvfb fluxbox x11vnc novnc chromium-browser
        
        echo "⏳ در حال نصب کلودفلرد برای ساخت تانل..."
        curl -L -o cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
        sudo dpkg -i cloudflared-linux-amd64.deb

    - name: Launch Virtual Desktop & Cloudflare Tunnel
      run: |
        echo "🚀 در حال راه‌اندازی دسکتاپ مجازی..."
        # ۱. ساخت یک نمایشگر مجازی
        Xvfb :1 -screen 0 1280x1024x24 &
        sleep 2
        export DISPLAY=:1
        
        # ۲. اجرای مدیریت پنجره‌های سبک (Fluxbox)
        fluxbox &
        sleep 2
        
        # ۳. راه‌اندازی سرور VNC بدون رمز روی لوکال‌هاست
        x11vnc -display :1 -nopw -forever -bg -listen 127.0.0.1 &
        sleep 2
        
        # ۴. راه‌اندازی وب‌اینترفیس noVNC روی پورت 6080
        /usr/share/novnc/utils/launch.sh --vnc 127.0.0.1:5900 --listen 6080 &
        sleep 3
        
        # ۵. اجرای خودکار مرورگر داخل دسکتاپ (با فلگ مخصوص برای گیت‌هاب)
        chromium-browser --no-sandbox --disable-setuid-sandbox &
        sleep 2
        
        # ۶. استارت تانل موقت و رایگان کلودفلر روی پورت noVNC
        cloudflared tunnel --url http://127.0.0.1:6080 > cloudflare.log 2>&1 &
        sleep 10
        
        # ۷. استخراج و چاپ لینک اختصاصی شما با بنر بزرگ
        echo "======================================================================"
        echo "📢 📢 📢 داداش لینک ورود به دسکتاپ مجازی (noVNC) شما آماده شد:"
        echo "----------------------------------------------------------------------"
        grep -o 'https://[^ ]*trycloudflare.com' cloudflare.log || echo "❌ لینک هنوز تولید نشده، چند ثانیه دیگر این استپ را باز و بسته کنید یا لاگ استپ بعدی را ببینید."
        echo "======================================================================"
        
        # ذخیره موقت لاگ برای یادآوری در استپ‌های بعدی
        cp cloudflare.log /tmp/cloudflare.log

    - name: Create Project Files (package.json & bot.js)
      run: |
        # ۱. ساخت خودکار فایل package.json
        cat << 'EOF' > package.json
        {
          "name": "6b6t-pvp-hsbot",
          "version": "1.0.0",
          "description": "Advanced Anarchy Bot for 6b6t",
          "main": "bot.js",
          "dependencies": {
            "mineflayer": "^4.20.0",
            "mineflayer-pathfinder": "^2.4.0",
            "minecraft-data": "^3.73.0"
          }
        }
        EOF

        # ۲. ساخت خودکار فایل اصلی bot.js (چاپ مستقیم کدها در لاگ گیت‌هاب)
        cat << 'EOF' > bot.js
        const mineflayer = require('mineflayer');
        const { pathfinder, Movements, goals } = require('mineflayer-pathfinder');
        const GoalBlock = goals.GoalBlock;

        let portalsEntered = 0;
        let isInMainMap = false;
        let waitingForTpaConfirm = false;
        let targetPlayer = null;
        let lastPos = null;

        function createBot() {
            console.log('\n=====================================================');
            console.log('=== 🚀 در حال اتصال بات pvp_HSbot به سرور 6b6t ===');
            console.log('=====================================================\n');
            
            const bot = mineflayer.createBot({
                host: '6b6t.org',
                username: 'pvp_HSbot',
                version: '1.21.1',
                skipValidation: true
            });

            bot.loadPlugin(pathfinder);

            // شنود لایه شبکه کلاینت برای مهار پکت‌های مخفی دیسکانکت قبل از بسته شدن سوکت
            bot.once('connect', () => {
                console.log('🔌 سوکت اولیه شبکه باز شد. در حال ارسال پکت هندشیک...');
                if (bot._client) {
                    bot._client.on('disconnect', (packet) => {
                        console.log('\n======================================================================');
                        console.log('⚠️ پکت دیسکانکت خام از سرور دریافت شد:');
                        console.log(JSON.stringify(packet, null, 2));
                        console.log('======================================================================\n');
                    });
                }
            });

            bot.on('spawn', () => {
                console.log('✅ بات با موفقیت وارد سرور شد!');
                setTimeout(() => {
                    bot.chat('/login AZHAN8585@#@#ABOL1234');
                    console.log('➡ دستور لاگین ارسال شد.');
                }, 2000);

                portalsEntered = 0;
                isInMainMap = false;
                waitingForTpaConfirm = false;
                targetPlayer = null;

                setTimeout(() => { findAndEnterPortal(bot); }, 5000);
            });

            async function findAndEnterPortal(bot) {
                if (isInMainMap || portalsEntered >= 2) return;
                console.log(`🔍 در حال جستجوی پورتال ندر... (مرحله ${portalsEntered + 1})`);
                const portalBlock = bot.findBlock({
                    matching: bot.registry.blocksByName['nether_portal'].id,
                    maxDistance: 32
                });
                if (portalBlock) {
                    console.log(`📍 پورتال در مختصات ${portalBlock.position} پیدا شد. حرکت...`);
                    const mcData = require('minecraft-data')(bot.version);
                    const movements = new Movements(bot, mcData);
                    movements.canDig = false;
                    bot.pathfinder.setMovements(movements);
                    bot.pathfinder.setGoal(new GoalBlock(portalBlock.position.x, portalBlock.position.y, portalBlock.position.z));
                } else {
                    setTimeout(() => findAndEnterPortal(bot), 3000);
                }
            }

            bot.on('move', () => {
                if (isInMainMap) return;
                if (!lastPos) { lastPos = bot.entity.position.clone(); return; }
                if (bot.entity.position.distanceTo(lastPos) > 60) {
                    portalsEntered++;
                    console.log(`🌌 بات تلپورت شد! تعداد پورتال‌ها: ${portalsEntered}`);
                    if (portalsEntered >= 2) {
                        isInMainMap = true;
                        console.log('=== 🎉 بات وارد مپ اصلی شد ===');
                    } else {
                        setTimeout(() => findAndEnterPortal(bot), 5000);
                    }
                }
                lastPos = bot.entity.position.clone();
            });

            bot.on('chat', async (username, message) => {
                if (username === bot.username) return;
                if (message === 'pvp_HS tpa') {
                    bot.chat(`/tpa ${username}`);
                }
                if (message === 'pvp_HS totem' || message === 'pvp_HSkit') {
                    const chestBlock = bot.findBlock({
                        matching: [bot.registry.blocksByName['chest'].id, bot.registry.blocksByName['trapped_chest'].id],
                        maxDistance: 20
                    });
                    if (!chestBlock) {
                        bot.chat(`/w ${username} داداش چستی پیدا نشد!`);
                        return;
                    }
                    try {
                        const chest = await bot.openChest(chestBlock);
                        const shulkerItem = chest.containerItems().find(item => item.name.includes('shulker_box'));
                        if (!shulkerItem) {
                            chest.close();
                            bot.chat(`/w ${username} داداش شالکری نبود!`);
                            return;
                        }
                        await chest.withdraw(shulkerItem.type, null, 1);
                        chest.close();
                        targetPlayer = username;
                        waitingForTpaConfirm = true;
                        bot.chat(`/tpa ${username}`);
                    } catch (err) {
                        bot.chat(`/w ${username} باگ در چست!`);
                    }
                }
            });

            bot.on('message', (jsonMsg) => {
                const msg = jsonMsg.toString();
                if (msg.includes('has requested to teleport to you') || msg.includes('tpa')) {
                    bot.chat('/tpaccept');
                }
            });

            bot.on('forcedMove', () => {
                if (waitingForTpaConfirm && targetPlayer) {
                    waitingForTpaConfirm = false;
                    setTimeout(() => {
                        bot.chat('/kill');
                        targetPlayer = null;
                    }, 1500);
                }
            });

            bot.on('kick', (reason) => {
                let kickMessage = 'تهی';
                if (reason) {
                    if (typeof reason === 'object') {
                        kickMessage = reason.text || '';
                        if (reason.extra && Array.isArray(reason.extra)) {
                            kickMessage += ' ' + reason.extra.map(e => e.text || JSON.stringify(e)).join('');
                        }
                        if (!kickMessage) kickMessage = JSON.stringify(reason, null, 2);
                    } else {
                        kickMessage = reason.toString();
                    }
                }
                console.log('\n======================================================================');
                console.log('⚠️ ⚠️ ⚠️  ALERT: KICKED FROM SERVER (کد وریفای در زیر است)  ⚠️ ⚠️ ⚠️');
                console.log('داداش سرور بات رو کیک کرد. متن کامل پیام کیک:');
                console.log('----------------------------------------------------------------------');
                console.log(kickMessage);
                console.log('======================================================================\n');
            });

            bot.on('end', (reason) => {
                console.log('\n======================================================================');
                console.log(`🛑 ارتباط قطع شد (end). دلیل: ${reason}`);
                console.log('⏱️ طبق دستور شما، ۴ دقیقه (۲۴۰۰۰۰ میلی ثانیه) قفل می‌کنیم تا بتونی وریفای کنی...');
                console.log('======================================================================\n');
                setTimeout(() => createBot(), 240000);
            });

            bot.on('error', (err) => {
                console.log('\n======================================================================');
                console.error('❌ خطای شبکه کلاینت:', err ? err.message : 'نامشخص');
                console.log('======================================================================\n');
            });
        }

        process.on('uncaughtException', (err) => { console.error('🔥 کرش ناگهانی پروسه:', err.message); });
        createBot();
        EOF

    - name: Install Dependencies
      run: npm install

    - name: Run Bot in Infinite Loop
      run: |
        echo "======================================================================"
        echo "🌐 جهت یادآوری مجدد، لینک ورود به دسکتاپ شما:"
        grep -o 'https://[^ ]*trycloudflare.com' /tmp/cloudflare.log || echo "لینک را از استپ Launch Virtual Desktop بردار داداش"
        echo "======================================================================"
        echo "=== در حال اجرای بات با قابلیت خود-ترمیمی زنده ==="
        while true; do
          node bot.js
          echo "بات متوقف شد یا کرش کرد. طبق دستور، ۴ دقیقه (۲۴۰ ثانیه) تا راه اندازی مجدد صبر میکنیم..."
          sleep 240
        done

        cat << 'EOF' > src/main/java/com/fpsboost/ui/AddonSettingsScreen.java
        package com.fpsboost.ui;

        import net.minecraft.client.gui.screen.Screen;
        import net.minecraft.client.gui.widget.ButtonWidget;
        import net.minecraft.text.Text;
        import com.fpsboost.config.ModConfig;

        public class AddonSettingsScreen extends Screen {
            private final Screen parent;

            public AddonSettingsScreen(Screen parent) {
                super(Text.literal("Independent Optimization Controls"));
                this.parent = parent;
            }

            @Override
            protected void init() {
                int btnWidth = 160;
                int startX = this.width / 2 - 165;
                int startY = this.height / 2 - 70;

                this.addDrawableChild(ButtonWidget.builder(Text.literal("Safe Culling: " + (ModConfig.cullEntities ? "§aON" : "§cOFF")), button -> {
                    ModConfig.cullEntities = !ModConfig.cullEntities; ModConfig.save();
                    this.client.setScreen(new AddonSettingsScreen(this.parent));
                }).dimensions(startX, startY, btnWidth, 20).build());

                this.addDrawableChild(ButtonWidget.builder(Text.literal("Block Culling: " + (ModConfig.cullBlockEntities ? "§aON" : "§cOFF")), button -> {
                    ModConfig.cullBlockEntities = !ModConfig.cullBlockEntities; ModConfig.save();
                    this.client.setScreen(new AddonSettingsScreen(this.parent));
                }).dimensions(startX + 170, startY, btnWidth, 20).build());

                this.addDrawableChild(ButtonWidget.builder(Text.literal("Limit Particles: " + (ModConfig.limitParticles ? "§aON" : "§cOFF")), button -> {
                    ModConfig.limitParticles = !ModConfig.limitParticles; ModConfig.save();
                    this.client.setScreen(new AddonSettingsScreen(this.parent));
                }).dimensions(startX, startY + 24, btnWidth, 20).build());

                this.addDrawableChild(ButtonWidget.builder(Text.literal("Ground Item Limit: " + (ModConfig.limitItems ? "§aON" : "§cOFF")), button -> {
                    ModConfig.limitItems = !ModConfig.limitItems; ModConfig.save();
                    this.client.setScreen(new AddonSettingsScreen(this.parent));
                }).dimensions(startX + 170, startY + 24, btnWidth, 20).build());

                this.addDrawableChild(ButtonWidget.builder(Text.literal("Armor Stand Cull: " + (ModConfig.cullArmorStands ? "§aON" : "§cOFF")), button -> {
                    ModConfig.cullArmorStands = !ModConfig.cullArmorStands; ModConfig.save();
                    this.client.setScreen(new AddonSettingsScreen(this.parent));
                }).dimensions(startX, startY + 48, btnWidth, 20).build());

                this.addDrawableChild(ButtonWidget.builder(Text.literal("Dynamic Distance: " + (ModConfig.dynamicDistances ? "§aON" : "§cOFF")), button -> {
                    ModConfig.dynamicDistances = !ModConfig.dynamicDistances; ModConfig.save();
                    this.client.setScreen(new AddonSettingsScreen(this.parent));
                }).dimensions(startX + 170, startY + 48, btnWidth, 20).build());

                this.addDrawableChild(ButtonWidget.builder(Text.literal("Disable Fog Render: " + (ModConfig.disableFog ? "§aON" : "§cOFF")), button -> {
                    ModConfig.disableFog = !ModConfig.disableFog; ModConfig.save();
                    this.client.setScreen(new AddonSettingsScreen(this.parent));
                }).dimensions(startX, startY + 72, btnWidth, 20).build());

                this.addDrawableChild(ButtonWidget.builder(Text.literal("Dynamic RAM Clear: " + (ModConfig.memoryOptimization ? "§aON" : "§cOFF")), button -> {
                    ModConfig.memoryOptimization = !ModConfig.memoryOptimization; ModConfig.save();
                    this.client.setScreen(new AddonSettingsScreen(this.parent));
                }).dimensions(startX + 170, startY + 72, btnWidth, 20).build());

                this.addDrawableChild(ButtonWidget.builder(Text.literal("Beacon Beam Cull: " + (ModConfig.optimizeBeacon ? "§aON" : "§cOFF")), button -> {
                    ModConfig.optimizeBeacon = !ModConfig.optimizeBeacon; ModConfig.save();
                    this.client.setScreen(new AddonSettingsScreen(this.parent));
                }).dimensions(startX, startY + 96, btnWidth, 20).build());

                this.addDrawableChild(ButtonWidget.builder(Text.literal("Show FPS HUD: " + (ModConfig.showFpsHud ? "§aON" : "§cOFF")), button -> {
                    ModConfig.showFpsHud = !ModConfig.showFpsHud; ModConfig.save();
                    this.client.setScreen(new AddonSettingsScreen(this.parent));
                }).dimensions(startX + 170, startY + 96, btnWidth, 20).build());

                this.addDrawableChild(ButtonWidget.builder(Text.literal("Save Settings"), button -> {
                    ModConfig.save();
                    this.client.setScreen(this.parent);
                }).dimensions(this.width / 2 - 50, startY + 130, 100, 20).build());
            }

            @Override
            public void render(net.minecraft.client.gui.DrawContext context, int mouseX, int mouseY, float delta) {
                this.renderBackground(context, mouseX, mouseY, delta);
                context.drawCenteredTextWithShadow(this.textRenderer, "§bCore Independent Optimization Controls", this.width / 2, 12, 0xFFFFFF);
                super.render(context, mouseX, mouseY, delta);
            }
        }

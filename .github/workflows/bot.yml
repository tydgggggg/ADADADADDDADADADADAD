name: Ultimate 6b6t Minecraft Bot

on:
  workflow_dispatch: # اجرای دستی پروژه از پنل گیت‌هاب

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20 # آپدیت به نسخه ۲۰ برای پایداری بیشتر

    - name: Install System Dependencies for GUI & noVNC
      run: |
        sudo apt-get update
        sudo apt-get install -y xvfb fluxbox x11vnc websockify novnc chromium-browser curl

    - name: Install Cloudflared (Cloudflare Tunnel)
      run: |
        curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o cloudflared
        chmod +x cloudflared
        sudo mv cloudflared /usr/local/bin/

    - name: Install Node.js Packages
      run: |
        npm install mineflayer mineflayer-pathfinder

    - name: Create Bot Script (Inline)
      run: |
        cat << 'EOF' > bot.js
        const mineflayer = require('mineflayer');
        const { pathfinder, Movements, goals } = require('mineflayer-pathfinder');
        const GoalFollow = goals.GoalFollow;

        const botArgs = {
            host: '6b6t.org',
            username: 'pvp_HSbot',
            version: '1.20.4'
        };

        let bot;
        let masterPlayer = "";

        function initBot() {
            console.log("--- در حال اتصال بات به سرور 6b6t ---");
            bot = mineflayer.createBot(botArgs);
            bot.loadPlugin(pathfinder);

            bot.on('login', () => {
                console.log("بات وارد سرور شد. ارسال رمز عبور...");
                setTimeout(() => {
                    bot.chat('/login AZHAN8585@#@#ABOL1234');
                }, 3000);
            });

            bot.on('spawn', () => {
                console.log("بات اسپاون شد. موقعیت:", bot.entity.position);
                
                if (bot.game.dimension === 'minecraft:overworld') {
                    console.log("حرکت به سمت پورتال اول لابی...");
                    let interval = setInterval(() => {
                        bot.setControlState('forward', true);
                        
                        const portalBlock = bot.findBlock({
                            matching: bot.registry.blocksByName.nether_portal.id,
                            maxDistance: 15
                        });
                        
                        if (portalBlock) {
                            console.log("پورتال پیدا شد! حرکت به سمت آن.");
                            bot.setControlState('forward', true);
                        }
                    }, 500);

                    setTimeout(() => {
                        clearInterval(interval);
                        bot.setControlState('forward', false);
                    }, 10000);
                }
            });

            bot.on('chat', async (username, message) => {
                if (username === bot.username) return;
                masterPlayer = username;

                if (message.includes('has requested to teleport to you') || message.includes('tpa')) {
                    if (message.includes(username)) {
                        bot.chat(`/tpaccept`);
                        console.log(`درخواست TPA از طرف ${username} قبول شد.`);
                    }
                }

                if (message === 'pvp_HS tpa') {
                    bot.chat(`/tpa ${username}`);
                    console.log(`ارسال درخواست TPA به ${username}`);
                }

                if (message === 'pvp_HS totem' || message === 'pvp_HSkit') {
                    const isTotem = message === 'pvp_HS totem';
                    bot.chat(`قربان، دارم دنبال شالکر ${isTotem ? 'توتم' : 'کیت فایت'} می‌گردم...`);
                    
                    const chestBlock = bot.findBlock({
                        matching: [bot.registry.blocksByName.chest.id, bot.registry.blocksByName.trapped_chest.id],
                        maxDistance: 20
                    });

                    if (!chestBlock) {
                        bot.chat("چستی در این نزدیکی پیدا نکردم!");
                        return;
                    }

                    try {
                        const chest = await bot.openChest(chestBlock);
                        let targetItem = null;

                        for (const item of chest.containerItems()) {
                            const name = item.displayName ? item.displayName.toLowerCase() : '';
                            if (item.name.includes('shulker_box')) {
                                if (isTotem && (name.includes('totem') || !name)) { 
                                    targetItem = item;
                                    break;
                                } else if (!isTotem && (name.includes('kit') || name.includes('fight') || !name)) {
                                    targetItem = item;
                                    break;
                                }
                            }
                        }

                        if (targetItem) {
                            await chest.withdraw(targetItem.type, null, 1);
                            bot.chat("شالکر برداشته شد! در حال ارسال TPA به شما...");
                            chest.close();
                            
                            bot.chat(`/tpa ${username}`);
                            
                            setTimeout(() => {
                                bot.chat('/kill');
                                console.log("بات خودکشی کرد تا شالکر دراپ شود.");
                            }, 7000);

                        } else {
                            bot.chat("شالکر مورد نظر داخل چست نبود!");
                            chest.close();
                        }
                    } catch (err) {
                        console.log("خطا در کار با چست:", err);
                    }
                }
            });

            bot.on('disconnect', (packet) => {
                console.log("!!! بات دیسکانکت شد !!! دلیل:", JSON.stringify(packet));
                console.log("تلاش مجدد برای اتصال تا ۱۵ ثانیه دیگر...");
                setTimeout(initBot, 15000);
            });

            bot.on('error', (err) => {
                console.log("خطای بات:", err);
            });
        }

        initBot();
        EOF

    - name: Start Virtual Display (Xvfb) & VNC Server
      run: |
        Xvfb :1 -screen 0 1280x1024x24 &
        export DISPLAY=:1
        sleep 2
        fluxbox &
        x11vnc -display :1 -nopw -listen localhost -xkb -forever &
        websockify --web=/usr/share/novnc 8083 localhost:5900 &
        sleep 2

    - name: Start Cloudflare Tunnel for Verification VNC
      run: |
        echo "=========================================================="
        echo "باز کردن تونل کلودفلر برای دسترسی به مرورگر سرور..."
        echo "=========================================================="
        cloudflared tunnel --url http://localhost:8083 &
        sleep 5

    - name: Open Chromium in Background
      run: |
        export DISPLAY=:1
        chromium-browser --no-sandbox --disable-dev-shm-usage "https://6b6t.org" &
        sleep 3

    - name: Run Minecraft Bot Session
      run: |
        node bot.js

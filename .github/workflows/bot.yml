        cat << 'EOF' > src/main/java/com/fpsboost/ui/FastOptimizeEngine.java
        package com.fpsboost.ui;

        import net.minecraft.client.MinecraftClient;
        import com.fpsboost.config.ModConfig;

        public class FastOptimizeEngine {
            public static boolean showNotification = false;
            private static int distanceCooldown = 0;

            public static void executeOneClickOptimize() {
                MinecraftClient client = MinecraftClient.getInstance();
                if (client == null || client.options == null) return;

                try {
                    client.options.getViewDistance().setValue(2);
                    client.options.getSimulationDistance().setValue(4);
                    client.options.write();
                    ModConfig.save();
                    
                    showNotification = true;
                    
                    Thread daemonNotificationThread = new Thread(() -> {
                        try { Thread.sleep(3500); } catch(Exception e){}
                        showNotification = false;
                    });
                    daemonNotificationThread.setDaemon(true);
                    daemonNotificationThread.start();

                } catch (Exception e) {}
            }

            public static void runBackgroundCacheClear() {
                MinecraftClient client = MinecraftClient.getInstance();
                if (client == null) return;

                if (ModConfig.memoryOptimization) {
                    if (client.worldRenderer != null && ModConfig.dynamicDistances) {
                        distanceCooldown++;
                        if (distanceCooldown >= 15) { 
                            distanceCooldown = 0;
                            int currentFps = client.getCurrentFps();
                            int currentDist = client.options.getViewDistance().getValue();
                            
                            if (currentFps < 22 && currentDist > 2) {
                                client.options.getViewDistance().setValue(currentDist - 1);
                            } else if (currentFps > 58 && currentDist < 6) {
                                client.options.getViewDistance().setValue(currentDist + 1);
                            }
                        }
                    }
                }
            }
        }
        EOF


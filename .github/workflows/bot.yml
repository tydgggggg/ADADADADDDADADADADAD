name: Run 6b6t Anarchy Bot 24/7

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Cloudflared & Browser Dependencies
      run: |
        echo "⏳ در حال نصب کلودفلرد و نیازمندی‌های مرورگر لینوکس..."
        curl -L -o cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
        sudo dpkg -i cloudflared.deb
        # نصب پکیج‌های لازم برای اجرای بدون مشکل Puppeteer در محیط اوبونتو گیت‌هاب
        sudo apt-get update && sudo apt-get install -y wget gnupg ca-certificates procps libxss1 libasound2 libatk-bridge2.0-0 libgtk-3-0 libgbm1

    - name: Launch Cloudflare Tunnel
      run: |
        echo "🚀 در حال راه‌اندازی تانل مستقیم برای وب سرور مدیریت وب..."
        cloudflared tunnel --url http://127.0.0.1:3000 > cloudflare.log 2>&1 &
        sleep 5
        cp cloudflare.log /tmp/cloudflare.log

    - name: Create Project Files (package.json & bot.js)
      run: |
        # ۱. ساخت فایل package.json همراه با پپتیر
        cat << 'EOF' > package.json
        {
          "name": "6b6t-pvp-hsbot",
          "version": "1.0.0",
          "description": "Autonomous Intelligent Anarchy Bot for 6b6t with Gemini Lobby Bypass",
          "main": "bot.js",
          "dependencies": {
            "mineflayer": "^4.20.0",
            "mineflayer-pathfinder": "^2.4.0",
            "minecraft-data": "^3.73.0",
            "express": "^4.19.2",
            "@google/generative-ai": "latest",
            "puppeteer": "^22.6.0"
          }
        }
        EOF

        # ۲. ساخت فایل هوشمند اصلی bot.js با سیستم خودکار وریفای سایت و پورتال‌ها
        cat << 'EOF' > bot.js
        const mineflayer = require('mineflayer');
        const { pathfinder, Movements, goals } = require('mineflayer-pathfinder');
        const { GoogleGenerativeAI } = require('@google/generative-ai');
        const puppeteer = require('puppeteer');
        const express = require('express');
        const app = express();

        app.use(express.json());

        // پیکربندی هسته هوش مصنوعی با کلید جدید و دقیق شما داداش گلم
        const genAI = new GoogleGenerativeAI('AQ.Ab8RN6LgR3sgqSN4mvfrIM-7KUPpDWul55EdJksMr06LQm42fA');
        const model = genAI.getGenerativeModel({ model: 'gemini-1.5-flash' });

        // متغیرهای وضعیت سراسری
        let bot = null;
        let isInMainMap = false;
        let autoMode = false;
        let waitingForTpaConfirm = false;
        let targetPlayer = null;
        let forwardInterval = null;
        let chatLogs = [];
        let portalStage = 0; // شمارشگر پورتال‌های رد شده (۰ تا ۲)
        let isVerifyingWeb = false;

        function logToWeb(msg) {
            const timestamp = new Date().toLocaleTimeString();
            chatLogs.push(`[${timestamp}] ${msg}`);
            if (chatLogs.length > 150) chatLogs.shift();
            console.log(msg);
        }

        function printTunnelLink() {
            try {
                const fs = require('fs');
                if (fs.existsSync('/tmp/cloudflare.log')) {
                    const logContent = fs.readFileSync('/tmp/cloudflare.log', 'utf8');
                    const match = logContent.match(/https:\/\/[^ ]*trycloudflare\.com/);
                    if (match) {
                        console.log('----------------------------------------------------------------------');
                        console.log(`🌐 لینک مستقیم پنل مدیریت وب شما: ${match[0]}`);
                        console.log('----------------------------------------------------------------------');
                    }
                }
            } catch (e) {}
        }

        // تابع اتوماسیون مرورگر و حل کپچای سایت توسط جمنای
        async function runWebVerification(verifyCode) {
            if (isVerifyingWeb) return;
            isVerifyingWeb = true;
            logToWeb(`🌐 شروع فرآیند مرورگر زنده برای تایید هویت در سایت با کد: ${verifyCode}`);
            
            try {
                const browser = await puppeteer.launch({
                    headless: true,
                    args: ['--no-sandbox', '--disable-setuid-sandbox', '--disable-dev-shm-usage']
                });
                const page = await browser.newPage();
                await page.setViewport({ width: 1280, height: 800 });
                
                logToWeb('🌐 در حال باز کردن صفحه وریفای سرور...');
                await page.goto('https://www.6b6t.org/en/verify', { waitUntil: 'networkidle2', timeout: 60000 });

                // وارد کردن نام کاربری بات در کادر اول و کد در کادر دوم
                const inputs = await page.$$('input');
                if (inputs.length >= 2) {
                    await inputs[0].type('pvp_HSbot', { delay: 50 });
                    await inputs[1].type(verifyCode, { delay: 50 });
                    logToWeb('✍️ نام کاربری و کد ۶ رقمی با موفقیت در فرم درج شد.');
                }

                await new Promise(r => setTimeout(r, 2000));
                
                // اسکرین‌شات از صفحه برای آنالیز کپچا توسط بینایی جمنای
                const screenshotBase64 = await page.screenshot({ encoding: 'base64' });
                logToWeb('📸 اسکرین‌شات کپچا برای بررسی به جمنای ارسال شد...');

                const imagePart = {
                    inlineData: { data: screenshotBase64, mimeType: "image/png" }
                };

                const captchaPrompt = `This is a verification page for a Minecraft server. We filled the username and code.
                Now look at the captcha checkbox / Turnstile / reCAPTCHA widget on this page.
                Find the exact location of the checkbox or verification tick area.
                Provide the approximate X and Y coordinates on a 1280x800 screen to click it.
                Format your response exactly as: CLICK: X=[pixel], Y=[pixel]
                If it's already ticked or just needs submission, reply: CLICK: SUBMIT`;

                const result = await model.generateContent([captchaPrompt, imagePart]);
                const aiResponse = result.response.text().trim();
                logToWeb(`🧠 تحلیل کپچای جمنای: ${aiResponse}`);

                if (aiResponse.toUpperCase().includes('CLICK: X=')) {
                    const match = aiResponse.match(/X=(\d+),\s*Y=(\d+)/i);
                    if (match) {
                        const clickX = parseInt(match[1]);
                        const clickY = parseInt(match[2]);
                        await page.mouse.click(clickX, clickY);
                        logToWeb(`🖱 جمنای روی نقطه کپچا کلیک کرد (X: ${clickX}, Y: ${clickY})`);
                        await new Promise(r => setTimeout(r, 6000)); // زمان جهت باز شدن یا حل تیک کپچا
                    }
                }

                // پیدا کردن و فشردن دکمه Submit Verification
                const buttons = await page.$$('button');
                let clickedSubmit = false;
                for (let btn of buttons) {
                    const text = await page.evaluate(el => el.textContent, btn);
                    if (text.includes('Submit') || text.includes('Verification') || text.includes('Verify')) {
                        await btn.click();
                        logToWeb('✅ دکمه Submit Verification با موفقیت فشرده شد.');
                        clickedSubmit = true;
                        break;
                    }
                }

                if (!clickedSubmit) {
                    // روش زاپاس کلیک روی فرم یا دکمه ارسال در صورت پیدا نشدن متن
                    await page.keyboard.press('Enter');
                    logToWeb('⌨️ کلید اینتر به عنوان زاپاس برای ثبت فرم فشرده شد.');
                }

                await new Promise(r => setTimeout(r, 4000));
                await browser.close();
                logToWeb('🎉 فرآیند وب وریفای با موفقیت پایان یافت. مرورگر بسته شد.');
            } catch (err) {
                logToWeb(`❌ خطای جدی در عملکرد وب وریفای پپتیر: ${err.message}`);
            } finally {
                isVerifyingWeb = false;
                // بعد از اتمام کار وب، بلافاصله مجدداً هسته گیم کانکت می‌شود
                setTimeout(() => createBot(), 2000);
            }
        }

        function createBot() {
            if (isVerifyingWeb) return; // اگر در حال کار با سایت است فعلا کلاینت بازی صبر کند

            logToWeb('🚀 در حال اتصال کلاینت ماینکرفت به سرور 6b6t...');
            printTunnelLink();
            
            bot = mineflayer.createBot({
                host: '6b6t.org',
                username: 'pvp_HSbot',
                version: '1.21.1',
                skipValidation: true
            });

            bot.loadPlugin(pathfinder);

            bot.once('connect', () => {
                logToWeb('🔌 سوکت شبکه بازی باز شد. ارسال پکت هندشیک...');
            });

            bot.on('spawn', () => {
                logToWeb('✅ بات داخل لابی اسپان شد.');
                waitingForTpaConfirm = false;
                targetPlayer = null;

                if (isInMainMap) {
                    logToWeb('👑 بات قبلاً در مپ اصلی مستقر شده است. حالت خودکار چت فعال است.');
                    return;
                }

                setTimeout(() => {
                    bot.chat('/login AZHAN8585@#@#ABOL1234');
                    logToWeb('➡ دستور لاگین به سرور ارسال شد.');

                    // سیستم ناوبری عبور متوالی از پورتال‌های اول و دوم
                    logToWeb(`🏃‍♂️ سیستم ناوبری استارت شد. در حال حرکت به سمت پورتال فاز: ${portalStage + 1}`);
                    if (forwardInterval) clearInterval(forwardInterval);
                    
                    forwardInterval = setInterval(() => {
                        if (!isInMainMap) {
                            bot.setControlState('forward', true);
                            if (bot.entity && bot.entity.isCollidedHorizontally) {
                                bot.setControlState('jump', true);
                            } else {
                                bot.setControlState('jump', false);
                            }
                        } else {
                            clearInterval(forwardInterval);
                        }
                    }, 100);
                }, 2000);
            });

            // رویداد جابجایی اجباری یا دایمنشن چنج که نشان‌دهنده ورود به پورتال است
            bot.on('forcedMove', () => {
                if (!isInMainMap) {
                    portalStage++;
                    logToWeb(`🌀 بات یک پورتال را رد کرد! تعداد پورتال‌های عبور شده: ${portalStage}`);
                    
                    if (portalStage >= 2) {
                        isInMainMap = true;
                        autoMode = true;
                        if (forwardInterval) clearInterval(forwardInterval);
                        bot.clearControlStates();
                        logToWeb('⚡ تایید نهایی: بات از هر دو پورتال لابی عبور کرد و وارد مپ اصلی شد! هوش مصنوعی جمنای خاموش شد.');
                    }
                }
            });

            bot.on('chat', async (username, message) => {
                if (username === bot.username) return;

                if (username === 'pvp_HS' && message === 'pvp_HSbot STOP') {
                    autoMode = false;
                    isInMainMap = false;
                    portalStage = 0;
                    if (forwardInterval) clearInterval(forwardInterval);
                    if (bot) bot.clearControlStates();
                    logToWeb('🛑 کنترلر خودکار متوقف و حالت دستی فعال شد.');
                    return;
                }

                if (!autoMode || !isInMainMap) return;

                if (message === 'pvp_HS tpa') {
                    bot.chat(`/tpa ${username}`);
                }
                
                if (message === 'pvp_HS totem' || message === 'pvp_HSkit') {
                    const chestBlock = bot.findBlock({
                        matching: [bot.registry.blocksByName['chest'].id, bot.registry.blocksByName['trapped_chest'].id],
                        maxDistance: 20
                    });
                    if (!chestBlock) {
                        bot.chat(`/w ${username} داداش چستی پیدا نشد!`);
                        return;
                    }
                    try {
                        const chest = await bot.openChest(chestBlock);
                        const shulkerItem = chest.containerItems().find(item => item.name.includes('shulker_box'));
                        if (!shulkerItem) {
                            chest.close();
                            bot.chat(`/w ${username} داداش شالکری نبود!`);
                            return;
                        }
                        await chest.withdraw(shulkerItem.type, null, 1);
                        chest.close();
                        targetPlayer = username;
                        waitingForTpaConfirm = true;
                        bot.chat(`/tpa ${username}`);
                    } catch (err) {
                        bot.chat(`/w ${username} باگ در چست!`);
                    }
                }
            });

            bot.on('message', (jsonMsg) => {
                const msg = jsonMsg.toString();
                logToWeb(msg);
                
                if (autoMode && (msg.includes('has requested to teleport to you') || msg.includes('tpa'))) {
                    bot.chat('/tpaccept');
                }
            });

            // شکار پیام دیسکانکت و استخراج کد ۶ رقمی وریفای سایت
            bot.on('kick', (reason) => {
                const reasonStr = JSON.stringify(reason);
                logToWeb(`❌ بات دیسکانکت شد. علت: ${reasonStr}`);
                
                const codeMatch = reasonStr.match(/\b\d{6}\b/);
                if (codeMatch) {
                    const extractedCode = codeMatch[0];
                    logToWeb(`🔑 مژده! کد ۶ رقمی وریفای کشف شد: ${extractedCode}`);
                    if (forwardInterval) clearInterval(forwardInterval);
                    runWebVerification(extractedCode);
                }
            });

            bot.on('end', (reason) => {
                if (forwardInterval) clearInterval(forwardInterval);
                if (!isVerifyingWeb) {
                    logToWeb(`🛑 ارتباط با سرور قطع شد (${reason}). تلاش مجدد تا ۱۰ ثانیه دیگر...`);
                    setTimeout(() => createBot(), 10000);
                }
            });

            bot.on('error', (err) => {
                logToWeb(`❌ خطای کلاینت: ${err ? err.message : 'نامشخص'}`);
            });
        }

        app.get('/', (req, res) => {
            res.send(`
            <!DOCTYPE html>
            <html dir="rtl">
            <head>
                <meta charset="UTF-8">
                <title>سیستم خودمختار pvp_HSbot</title>
                <style>
                    body { background: #121212; color: #e0e0e0; font-family: Tahoma; margin: 15px; text-align: center; }
                    h2 { color: #4caf50; margin-bottom: 5px; }
                    #stats { background: #1e1e1e; padding: 12px; border-radius: 8px; margin-bottom: 10px; font-size: 13px; text-align: right; border: 1px solid #333; }
                    #console { background: #000; color: #00ff00; border: 1px solid #444; height: 320px; overflow-y: scroll; padding: 10px; font-family: monospace; text-align: left; border-radius: 6px; font-size: 12px; margin-bottom: 10px; }
                    .pad { display: grid; grid-template-columns: repeat(3, 52px); gap: 6px; justify-content: center; margin: 10px auto; }
                    .pad button { background: #2e7d32; color: white; border: none; padding: 12px; font-size: 15px; font-weight: bold; border-radius: 6px; cursor: pointer; }
                </style>
            </head>
            <body>
                <h2>🤖 پنل مدیریت هوشمند تحت وب (Full Automation Mode)</h2>
                <div id="dashboard-wrapper">
                    <div id="stats">در حال دریافت داده‌ها...</div>
                    <div id="console"></div>
                    <div class="pad">
                        <div></div><button onmousedown="move('forward',true)" onmouseup="move('forward',false)">W</button><div></div>
                        <button onmousedown="move('left',true)" onmouseup="move('left',false)">A</button>
                        <button onmousedown="move('back',true)" onmouseup="move('back',false)">S</button>
                        <button onmousedown="move('right',true)" onmouseup="move('right',false)">D</button>
                        <div></div><button onmousedown="move('jump',true)" onmouseup="move('jump',false)">✈️</button><div></div>
                    </div>
                </div>
                <script>
                    function move(action, state) {
                        fetch('/api/move', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ action, state }) });
                    }
                    setInterval(() => {
                        fetch('/api/status').then(r => r.json()).then(d => {
                            document.getElementById('stats').innerHTML = 
                                '📍 <b>موقعیت فعلی:</b> X: ' + d.pos.x + ' | Y: ' + d.pos.y + ' | Z: ' + d.pos.z + 
                                '<br>⚙️ <b>وضعیت فاز عملیاتی:</b> ' + (d.autoMode ? '<span style="color:#4caf50;font-weight:bold;">مستقر در مپ اصلی (AUTO) - جمنای خاموش</span>' : '<span style="color:#ff9800;font-weight:bold;">در حال مانیتورینگ لابی، وریفای خودکار وب و عبور از پورتال‌ها...</span>');
                            let c = document.getElementById('console');
                            c.innerHTML = d.logs.map(l => '<div>' + l + '</div>').join('');
                            c.scrollTop = c.scrollHeight;
                        });
                    }, 1000);
                </script>
            </body>
            </html>
            `);
        });

        app.get('/api/status', (req, res) => {
            let pos = { x: 0, y: 0, z: 0 };
            if (bot && bot.entity && bot.entity.position) {
                pos = { x: Math.round(bot.entity.position.x), y: Math.round(bot.entity.position.y), z: Math.round(bot.entity.position.z) };
            }
            res.json({ pos, autoMode, logs: chatLogs });
        });

        app.post('/api/move', (req, res) => {
            const { action, state } = req.body;
            if (bot && !autoMode) {
                bot.setControlState(action, state);
            }
            res.sendStatus(200);
        });

        app.listen(3000, () => {
            console.log('🌐 وب سرور مانیتورینگ روی پورت 3000 فعال شد.');
        });

        process.on('uncaughtException', (err) => { console.error('🔥 کرش پروسه:', err.message); });
        createBot();
        EOF

    - name: Install Dependencies
      run: npm install

    - name: Run Bot in Infinite Loop
      run: |
        echo "=== در حال اجرای بات با قابلیت خود-ترمیمی زنده ==="
        while true; do
          echo "----------------------------------------------------------------------"
          grep -o 'https://[^ ]*trycloudflare.com' /tmp/cloudflare.log || echo "لینک موقت یافت نشد"
          echo "----------------------------------------------------------------------"
          node bot.js
          echo "بات متوقف شد یا کرش کرد. طبق دستور، ۱۰ ثانیه تا راه اندازی مجدد صبر میکنیم..."
          sleep 10
        done

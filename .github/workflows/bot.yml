                int btnWidth = 200;
                int startY = this.height / 2 - 50;

                this.addDrawableChild(ButtonWidget.builder(Text.literal("§c🥔 Potato Profile"), button -> {
                    ModConfig.applyProfile("Potato");
                }).dimensions(this.width / 2 - 100, startY, btnWidth, 20).build());

                this.addDrawableChild(ButtonWidget.builder(Text.literal("§e📉 Low-End Profile"), button -> {
                    ModConfig.applyProfile("Low-End");
                }).dimensions(this.width / 2 - 100, startY + 24, btnWidth, 20).build());

                this.addDrawableChild(ButtonWidget.builder(Text.literal("§a📊 Mid-End Profile"), button -> {
                    ModConfig.applyProfile("Mid-End");
                }).dimensions(this.width / 2 - 100, startY + 48, btnWidth, 20).build());

                this.addDrawableChild(ButtonWidget.builder(Text.literal("§b🔍 Auto Detect Hardware"), button -> {
